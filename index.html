<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>말씀 팔찌 - 오늘의 말씀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #faf7f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .cross { font-size: 22px; color: #b07d4a; letter-spacing: 6px; margin-bottom: 1.25rem; text-align: center; }
    .date-label { font-size: 12px; color: #b0977a; letter-spacing: 2px; margin-bottom: 1.5rem; text-align: center; }
    .toggle-wrap { display: flex; gap: 8px; margin-bottom: 1.75rem; }
    .toggle-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #d4b896;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      color: #b07d4a;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .toggle-btn.active { background: #b07d4a; color: #fff; border-color: #b07d4a; }
    .card {
      background: #ffffff;
      border: 1px solid #e8ddd0;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .verse-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 2;
      color: #2c2016;
      margin-bottom: 1.75rem;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .divider { width: 40px; height: 1px; background: #d4b896; margin: 0 auto 1.25rem; }
    .verse-ref { font-size: 13px; color: #b07d4a; letter-spacing: 1px; font-weight: 500; margin-bottom: 0.5rem; }
    .translation { font-size: 11px; color: #c4aa8a; letter-spacing: 1px; }
    .footer { margin-top: 2.5rem; font-size: 11px; color: #c4aa8a; letter-spacing: 1px; text-align: center; }
  </style>
</head>
<body>
  <div class="cross">✦ ✝ ✦</div>
  <div class="date-label" id="date-label"></div>
  <div class="toggle-wrap">
    <button class="toggle-btn active" id="btn-gae" onclick="setTranslation('gae')">개역개정</button>
    <button class="toggle-btn" id="btn-sae" onclick="setTranslation('sae')">새번역</button>
  </div>
  <div class="card">
    <p class="verse-text" id="verse-text"></p>
    <div class="divider"></div>
    <div class="verse-ref" id="verse-ref"></div>
    <div class="translation" id="translation-label">개역개정</div>
  </div>
  <div class="footer">말씀 팔찌 · 믿음을 손목에</div>

  <script>
    const verses = {
      gae: [
        { text: "여호와는 나의 목자시니 내게 부족함이 없으리로다.", ref: "시편 23:1" },
        { text: "하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니 이는 그를 믿는 자마다 멸망하지 않고 영생을 얻게 하려 하심이라.", ref: "요한복음 3:16" },
        { text: "내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라.", ref: "빌립보서 4:13" },
        { text: "모든 것이 합력하여 선을 이루느니라.", ref: "로마서 8:28" },
        { text: "주는 나의 빛이요 나의 구원이시니 내가 누구를 두려워하리요.", ref: "시편 27:1" },
        { text: "너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라.", ref: "마태복음 6:33" },
        { text: "내가 세상 끝날까지 너희와 항상 함께 있으리라.", ref: "마태복음 28:20" },
        { text: "여호와를 기뻐하라 그가 네 마음의 소원을 네게 이루어 주시리로다.", ref: "시편 37:4" },
        { text: "너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라.", ref: "잠언 3:5" },
        { text: "강하고 담대하라 두려워하지 말며 놀라지 말라 네가 어디로 가든지 네 하나님 여호와가 너와 함께 하느니라.", ref: "여호수아 1:9" },
        { text: "여호와는 나의 힘과 나의 방패시니 내 마음이 그를 의지하여 도움을 얻었도다.", ref: "시편 28:7" },
        { text: "오직 성령의 열매는 사랑과 희락과 화평과 오래 참음과 자비와 양선과 충성과 온유와 절제니.", ref: "갈라디아서 5:22-23" },
        { text: "사랑은 오래 참고 사랑은 온유하며 시기하지 아니하며 사랑은 자랑하지 아니하며 교만하지 아니하며.", ref: "고린도전서 13:4" },
        { text: "아무것도 염려하지 말고 다만 모든 일에 기도와 간구로 너희 구할 것을 감사함으로 하나님께 아뢰라.", ref: "빌립보서 4:6" },
        { text: "내가 주께 감사하옴은 나를 지으심이 심히 기묘하심이라 주께서 하시는 일이 기이함을 내 영혼이 잘 아나이다.", ref: "시편 139:14" },
        { text: "오직 여호와를 앙망하는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요.", ref: "이사야 40:31" },
        { text: "하나님은 우리의 피난처시요 힘이시니 환난 중에 만날 큰 도움이시라.", ref: "시편 46:1" },
        { text: "주의 말씀은 내 발에 등이요 내 길에 빛이니이다.", ref: "시편 119:105" },
        { text: "두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라.", ref: "이사야 41:10" },
        { text: "항상 기뻐하라 쉬지 말고 기도하라 범사에 감사하라.", ref: "데살로니가전서 5:16-18" },
        { text: "믿음은 바라는 것들의 실상이요 보이지 않는 것들의 증거니.", ref: "히브리서 11:1" },
        { text: "주 안에서 항상 기뻐하라 내가 다시 말하노니 기뻐하라.", ref: "빌립보서 4:4" },
        { text: "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라.", ref: "마태복음 11:28" },
        { text: "그러므로 너희 염려를 다 주께 맡기라 이는 그가 너희를 돌보심이라.", ref: "베드로전서 5:7" },
        { text: "예수께서 이르시되 내가 곧 길이요 진리요 생명이니 나로 말미암지 않고는 아버지께로 올 자가 없느니라.", ref: "요한복음 14:6" },
        { text: "나 여호와가 말하노라 너희를 향한 나의 생각을 내가 아나니 평안이요 재앙이 아니니라 너희에게 미래와 희망을 주는 것이니라.", ref: "예레미야 29:11" },
        { text: "하나님이 우리를 위하시면 누가 우리를 대적하리요.", ref: "로마서 8:31" },
        { text: "내가 확신하노니 사망이나 생명이나 어떤 것도 우리를 하나님의 사랑에서 끊을 수 없으리라.", ref: "로마서 8:38" },
        { text: "우리가 선을 행하되 낙심하지 말지니 포기하지 아니하면 때가 이르매 거두리라.", ref: "갈라디아서 6:9" },
        { text: "나는 포도나무요 너희는 가지라 그가 내 안에, 내가 그 안에 거하면 사람이 열매를 많이 맺나니 나를 떠나서는 너희가 아무것도 할 수 없음이라.", ref: "요한복음 15:5" },
        { text: "예수 그리스도는 어제나 오늘이나 영원토록 동일하시니라.", ref: "히브리서 13:8" },
        { text: "여호와의 말씀에 내가 너를 결코 떠나지 아니하고 너를 버리지 아니하리라 하셨느니라.", ref: "히브리서 13:5" },
        { text: "하나님은 사랑이시라 사랑 안에 거하는 자는 하나님 안에 거하고 하나님도 그의 안에 거하시느니라.", ref: "요한일서 4:16" },
        { text: "우리가 사랑함은 그가 먼저 우리를 사랑하셨음이라.", ref: "요한일서 4:19" },
        { text: "그런즉 누구든지 그리스도 안에 있으면 새로운 피조물이라 이전 것은 지나갔으니 보라 새 것이 되었도다.", ref: "고린도후서 5:17" },
        { text: "내가 사는 것이 그리스도니 죽는 것도 유익함이라.", ref: "빌립보서 1:21" },
        { text: "그런즉 믿음, 소망, 사랑, 이 세 가지는 항상 있을 것인데 그 중의 제일은 사랑이라.", ref: "고린도전서 13:13" },
        { text: "이것이 내 계명이니 내가 너희를 사랑한 것 같이 너희도 서로 사랑하라.", ref: "요한복음 15:12" },
        { text: "나는 부활이요 생명이니 나를 믿는 자는 죽어도 살겠고.", ref: "요한복음 11:25" },
        { text: "진리가 너희를 자유롭게 하리라.", ref: "요한복음 8:32" },
        { text: "구하라 그리하면 너희에게 주실 것이요 찾으라 그리하면 찾아낼 것이요 문을 두드리라 그리하면 너희에게 열릴 것이니.", ref: "마태복음 7:7" },
        { text: "보라 내가 문 밖에 서서 두드리노니 누구든지 내 음성을 듣고 문을 열면 내가 그에게로 들어가 그와 더불어 먹고 그는 나와 더불어 먹으리라.", ref: "요한계시록 3:20" },
        { text: "너희 중에 누구든지 지혜가 부족하거든 모든 사람에게 후히 주시고 꾸짖지 아니하시는 하나님께 구하라 그리하면 주시리라.", ref: "야고보서 1:5" },
        { text: "하나님을 가까이하라 그리하면 너희를 가까이하시리라.", ref: "야고보서 4:8" },
        { text: "의인의 간구는 역사하는 힘이 큼이니라.", ref: "야고보서 5:16" },
        { text: "악에게 지지 말고 선으로 악을 이기라.", ref: "로마서 12:21" },
        { text: "내가 그리스도와 함께 십자가에 못 박혔나니 그런즉 이제는 내가 사는 것이 아니요 오직 내 안에 그리스도께서 사시는 것이라.", ref: "갈라디아서 2:20" },
        { text: "너는 내게 부르짖으라 내가 네게 응답하겠고 네가 알지 못하는 크고 은밀한 일을 네게 보이리라.", ref: "예레미야 33:3" },
        { text: "모든 성경은 하나님의 감동으로 된 것으로 교훈과 책망과 바르게 함과 의로 교육하기에 유익하니.", ref: "디모데후서 3:16" },
        { text: "성령이 너희에게 임하시면 너희가 권능을 받고 예루살렘과 온 유대와 사마리아와 땅 끝까지 이르러 내 증인이 되리라.", ref: "사도행전 1:8" },
        { text: "여호와의 자비와 긍휼이 아침마다 새로우니 주의 성실하심이 크시도소이다.", ref: "예레미야애가 3:23" },
        { text: "호흡이 있는 자마다 여호와를 찬양할지어다 할렐루야.", ref: "시편 150:6" },
        { text: "내 영혼아 네가 어찌하여 낙심하며 어찌하여 내 속에서 불안해 하는가 너는 하나님께 소망을 두라.", ref: "시편 42:11" },
        { text: "하나님이 능히 모든 은혜를 너희에게 넘치게 하시나니 이는 너희로 모든 일에 항상 모든 것이 넉넉하여.", ref: "고린도후서 9:8" },
        { text: "나의 하나님이 그리스도 예수 안에서 영광 가운데 그 풍성한 대로 너희 모든 쓸 것을 채우시리라.", ref: "빌립보서 4:19" },
        { text: "여호와는 마음이 상한 자를 가까이 하시고 충심으로 통회하는 자를 구원하시는도다.", ref: "시편 34:18" },
        { text: "오직 나는 여호와를 바라보며 나를 구원하시는 하나님을 기다리노니.", ref: "미가 7:7" },
        { text: "사람이 마음으로 자기의 길을 계획할지라도 그의 걸음을 인도하시는 이는 여호와시니라.", ref: "잠언 16:9" },
        { text: "네 길을 여호와께 맡기라 그를 의지하면 그가 이루시고.", ref: "시편 37:5" },
        { text: "여호와를 의지하고 선을 행하라 땅에 머무는 동안 그의 성실을 먹을 거리로 삼을지어다.", ref: "시편 37:3" },
        { text: "주의 말씀의 맛이 내게 어찌 그리 단지요 내 입에 꿀보다 더 다니이다.", ref: "시편 119:103" },
        { text: "이 날은 여호와께서 정하신 것이라 이 날에 우리가 기뻐하고 즐거워하리로다.", ref: "시편 118:24" },
        { text: "눈물을 흘리며 씨를 뿌리는 자는 기쁨으로 거두리로다.", ref: "시편 126:5" },
        { text: "여호와께서 집을 세우지 아니하시면 세우는 자의 수고가 헛되며 여호와께서 성을 지키지 아니하시면 파수꾼의 깨어 있음이 헛되도다.", ref: "시편 127:1" },
        { text: "내 이름으로 불리는 내 백성이 그들의 악한 길에서 떠나 스스로 낮추고 기도하여 내 얼굴을 찾으면 내가 하늘에서 듣고 그들의 죄를 사하고 그들의 땅을 고칠지라.", ref: "역대하 7:14" },
        { text: "그러므로 이제 그리스도 예수 안에 있는 자에게는 결코 정죄함이 없나니.", ref: "로마서 8:1" },
        { text: "하나님이 우리에게 주신 것은 두려워하는 마음이 아니요 오직 능력과 사랑과 절제하는 마음이니.", ref: "디모데후서 1:7" },
        { text: "그가 채찍에 맞음으로 우리는 나음을 받았도다.", ref: "이사야 53:5" },
        { text: "보라 내가 만물을 새롭게 하노라.", ref: "요한계시록 21:5" },
        { text: "또 목마른 자도 올 것이요 또 원하는 자는 값없이 생명수를 받으라 하시더라.", ref: "요한계시록 22:17" },
        { text: "하나님은 모든 사람이 구원을 받으며 진리를 아는 데에 이르기를 원하시느니라.", ref: "디모데전서 2:4" },
        { text: "무릇 하나님께로부터 난 자마다 세상을 이기느니라 세상을 이기는 승리는 이것이니 우리의 믿음이니라.", ref: "요한일서 5:4" },
        { text: "나는 알파와 오메가요 처음과 마지막이요 시작과 마침이라.", ref: "요한계시록 22:13" },
        { text: "여호와의 인자하심이 영원하고 그의 진실하심이 대대에 이르도다.", ref: "시편 100:5" },
        { text: "사랑하는 자들아 하나님이 이같이 우리를 사랑하셨은즉 우리도 서로 사랑하는 것이 마땅하도다.", ref: "요한일서 4:11" },
        { text: "너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 이것은 너희에게서 난 것이 아니요 하나님의 선물이라.", ref: "에베소서 2:8" },
        // 30 new verses (개역개정)
        { text: "여호와는 나의 목자시니 내게 부족함이 없으리로다 그가 나를 푸른 풀밭에 누이시며 쉴 만한 물 가로 인도하시는도다.", ref: "시편 23:1-2" },
        { text: "여호와를 기다리는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요 달려가도 곤비하지 아니하겠고 걸어가도 피곤하지 아니하리로다.", ref: "이사야 40:31" },
        { text: "내가 주의 이름을 의뢰하고 주의 말씀을 바라나이다.", ref: "시편 119:114" },
        { text: "너희 믿음의 확실함은 불로 연단하여도 없어질 금보다 더 귀하여 예수 그리스도께서 나타나실 때에 칭찬과 영광과 존귀를 얻게 할 것이니라.", ref: "베드로전서 1:7" },
        { text: "내가 산을 향하여 눈을 들리라 나의 도움이 어디서 올까 나의 도움은 천지를 지으신 여호와에게서로다.", ref: "시편 121:1-2" },
        { text: "여호와께서 너를 지키시는 자라 여호와께서 네 오른쪽에서 네 그늘이 되시나니.", ref: "시편 121:5" },
        { text: "네가 물 가운데로 지날 때에 내가 너와 함께 할 것이라 강을 건널 때에 물이 너를 침몰하지 못할 것이며.", ref: "이사야 43:2" },
        { text: "하나님이 우리를 구원하사 거룩하신 소명으로 부르심은 우리의 행위대로 하심이 아니요 오직 자기의 뜻과 영원 전부터 그리스도 예수 안에서 우리에게 주신 은혜대로 하심이라.", ref: "디모데후서 1:9" },
        { text: "자기를 낮추는 자는 높아지리라.", ref: "마태복음 23:12" },
        { text: "하나님이 우리를 사랑하시는 사랑을 우리가 알고 믿었노니 하나님은 사랑이시라.", ref: "요한일서 4:16" },
        { text: "예수께서 이르시되 나는 생명의 떡이니 내게 오는 자는 결코 주리지 아니할 터이요 나를 믿는 자는 영원히 목마르지 아니하리라.", ref: "요한복음 6:35" },
        { text: "이 사람들은 다 믿음을 따라 죽었으며 약속을 받지 못하였으되 그것들을 멀리서 보고 환영하며 또 땅에서는 외국인과 나그네임을 증언하였으니.", ref: "히브리서 11:13" },
        { text: "오직 의인은 믿음으로 말미암아 살리라.", ref: "로마서 1:17" },
        { text: "너희는 세상의 빛이라 산 위에 있는 동네가 숨겨지지 못할 것이요.", ref: "마태복음 5:14" },
        { text: "너희는 세상의 소금이니 소금이 만일 그 맛을 잃으면 무엇으로 짜게 하리요.", ref: "마태복음 5:13" },
        { text: "복 있는 사람은 악인들의 꾀를 따르지 아니하며 죄인들의 길에 서지 아니하며 오만한 자들의 자리에 앉지 아니하고.", ref: "시편 1:1" },
        { text: "오직 그의 율법을 즐거워하여 그의 율법을 주야로 묵상하는도다.", ref: "시편 1:2" },
        { text: "내가 여호와를 항상 내 앞에 모심이여 그가 나의 오른쪽에 계시므로 내가 흔들리지 아니하리로다.", ref: "시편 16:8" },
        { text: "하늘이 하나님의 영광을 선포하고 궁창이 그의 손으로 하신 일을 나타내는도다.", ref: "시편 19:1" },
        { text: "여호와는 나의 반석이시요 나의 요새시요 나를 건지시는 이시요 나의 하나님이시요 내가 그 안에 피할 나의 바위시요 나의 방패시요 나의 구원의 뿔이시요 나의 산성이시로다.", ref: "시편 18:2" },
        { text: "그러므로 믿음, 소망, 사랑, 이 세 가지는 항상 있을 것인데 그 중의 제일은 사랑이라.", ref: "고린도전서 13:13" },
        { text: "사랑은 이웃에게 악을 행하지 아니하나니 그러므로 사랑은 율법의 완성이니라.", ref: "로마서 13:10" },
        { text: "무엇이든지 참되며 무엇이든지 경건하며 무엇이든지 옳으며 무엇이든지 정결하며 무엇이든지 사랑 받을 만하며 무엇이든지 칭찬 받을 만하며 이것들을 생각하라.", ref: "빌립보서 4:8" },
        { text: "내가 확실히 알거니와 선한 것 곧 육신에 선한 것이 내 속에 거하지 아니하는 줄을 아노니 원함은 내게 있으나 선을 행하는 것은 없노라.", ref: "로마서 7:18" },
        { text: "하나님은 미쁘시도다 너희가 감당하지 못할 시험 당함을 허락하지 아니하시고 시험 당할 즈음에 또한 피할 길을 내사 너희로 능히 감당하게 하시느니라.", ref: "고린도전서 10:13" },
        { text: "내가 어려서부터 늙기까지 의인이 버림을 당하거나 그의 자손이 걸식함을 보지 못하였도다.", ref: "시편 37:25" },
        { text: "여호와를 경외하는 것이 지혜의 근본이라 그의 계명을 지키는 자는 다 훌륭한 지각을 가진 자이니 여호와를 찬양함이 영원히 계속되리로다.", ref: "시편 111:10" },
        { text: "사람이 사는 것이 떡으로만 되는 것이 아니요 하나님의 입으로부터 나오는 모든 말씀으로 사는 것이라.", ref: "마태복음 4:4" },
        { text: "예수께서 그에게 이르시되 네 마음을 다하고 목숨을 다하고 뜻을 다하여 주 너의 하나님을 사랑하라 하셨으니 이것이 크고 첫째 되는 계명이요.", ref: "마태복음 22:37-38" },
        { text: "이와 같이 너희 빛이 사람 앞에 비치게 하여 그들로 너희 착한 행실을 보고 하늘에 계신 너희 아버지께 영광을 돌리게 하라.", ref: "마태복음 5:16" },
      ],
      sae: [
        { text: "주님은 나의 목자시니 내게 부족함이 없어라.", ref: "시편 23:1" },
        { text: "하나님이 세상을 이처럼 사랑하셔서 외아들을 주셨으니 이는 그를 믿는 사람마다 멸망하지 않고 영생을 얻게 하려는 것이다.", ref: "요한복음 3:16" },
        { text: "나에게 능력을 주시는 분 안에서 나는 모든 것을 할 수 있습니다.", ref: "빌립보서 4:13" },
        { text: "하나님을 사랑하는 사람들 곧 그분의 뜻대로 부르심을 받은 사람들에게는 모든 것이 서로 협력해서 선을 이룹니다.", ref: "로마서 8:28" },
        { text: "주님은 나의 빛이요 나의 구원이시니 내가 누구를 두려워하랴.", ref: "시편 27:1" },
        { text: "너희는 먼저 하나님의 나라와 하나님의 의를 구하여라 그리하면 이 모든 것을 너희에게 더하여 주실 것이다.", ref: "마태복음 6:33" },
        { text: "내가 세상 끝날까지 항상 너희와 함께 있겠다.", ref: "마태복음 28:20" },
        { text: "주님을 기뻐하여라 그분이 네 마음의 소원을 이루어 주실 것이다.", ref: "시편 37:4" },
        { text: "마음을 다하여 주님을 신뢰하고 네 자신의 명철함에 의존하지 마라.", ref: "잠언 3:5" },
        { text: "강하고 담대하여라 두려워하지 말고 떨지도 마라 네가 어디로 가든지 주 너의 하나님이 함께 할 것이다.", ref: "여호수아 1:9" },
        { text: "주님은 나의 힘과 나의 방패시니 내 마음이 그분을 의지하여 도움을 받았도다.", ref: "시편 28:7" },
        { text: "성령의 열매는 사랑과 기쁨과 화평과 인내와 친절과 선함과 신실함과 온유와 절제입니다.", ref: "갈라디아서 5:22-23" },
        { text: "사랑은 오래 참습니다 사랑은 친절합니다 사랑은 시기하지 않습니다 사랑은 자랑하지 않습니다 사랑은 교만하지 않습니다.", ref: "고린도전서 13:4" },
        { text: "아무것도 염려하지 말고 모든 일을 기도와 간구로 하되 감사하는 마음으로 여러분이 바라는 것을 하나님께 아뢰십시오.", ref: "빌립보서 4:6" },
        { text: "내가 주님께 감사드리는 것은 주님이 나를 신묘하고 기이하게 지으셨기 때문입니다.", ref: "시편 139:14" },
        { text: "주님을 기다리는 사람은 새 힘을 얻으며 독수리가 날개 치며 올라가듯 올라갈 것이다.", ref: "이사야 40:31" },
        { text: "하나님은 우리의 피난처이시요 우리의 힘이시니 환난 때에 우리를 도우시는 분이시다.", ref: "시편 46:1" },
        { text: "주님의 말씀은 내 발의 등불이요 내 길의 빛입니다.", ref: "시편 119:105" },
        { text: "두려워하지 마라 내가 너와 함께 있다 놀라지 마라 나는 네 하나님이다.", ref: "이사야 41:10" },
        { text: "항상 기뻐하십시오 끊임없이 기도하십시오 모든 것에 감사하십시오.", ref: "데살로니가전서 5:16-18" },
        { text: "믿음은 바라는 것들을 확신하는 것이요 보이지 않는 것들을 확증하는 것입니다.", ref: "히브리서 11:1" },
        { text: "주님 안에서 항상 기뻐하십시오 다시 말합니다 기뻐하십시오.", ref: "빌립보서 4:4" },
        { text: "수고하며 무거운 짐을 진 사람은 모두 내게로 오너라 내가 너희를 쉬게 하겠다.", ref: "마태복음 11:28" },
        { text: "여러분의 모든 걱정을 하나님께 맡기십시오 하나님이 여러분을 돌봐 주십니다.", ref: "베드로전서 5:7" },
        { text: "예수께서 말씀하셨다 나는 길이요 진리요 생명이다 나를 통하지 않고서는 아무도 아버지께 올 수 없다.", ref: "요한복음 14:6" },
        { text: "나 주가 말한다 나는 너희를 위한 계획을 알고 있다 재앙이 아니라 평화를 주려는 계획이다 너희에게 미래와 희망을 주려는 것이다.", ref: "예레미야 29:11" },
        { text: "하나님이 우리 편이시면 누가 우리를 대적하겠습니까.", ref: "로마서 8:31" },
        { text: "나는 확신합니다 죽음도 삶도 어떤 것도 우리를 그리스도 예수 안에 있는 하나님의 사랑에서 끊을 수 없습니다.", ref: "로마서 8:38-39" },
        { text: "선한 일을 하다가 낙심하지 맙시다 포기하지 않으면 때가 되어 거둘 것입니다.", ref: "갈라디아서 6:9" },
        { text: "나는 포도나무요 너희는 가지이다 사람이 내 안에 있고 내가 그 안에 있으면 그는 많은 열매를 맺는다 나를 떠나서는 너희가 아무것도 할 수 없다.", ref: "요한복음 15:5" },
        { text: "예수 그리스도는 어제도 오늘도 영원히 동일하십니다.", ref: "히브리서 13:8" },
        { text: "하나님께서 말씀하시기를 나는 결코 너를 떠나지 않겠고 결코 너를 버리지 않겠다 하셨습니다.", ref: "히브리서 13:5" },
        { text: "하나님은 사랑이십니다 사랑 안에 있는 사람은 하나님 안에 있고 하나님도 그 사람 안에 계십니다.", ref: "요한일서 4:16" },
        { text: "우리가 사랑하는 것은 하나님이 먼저 우리를 사랑하셨기 때문입니다.", ref: "요한일서 4:19" },
        { text: "그러므로 누구든지 그리스도 안에 있으면 새로운 피조물입니다 옛것은 지나갔고 새것이 왔습니다.", ref: "고린도후서 5:17" },
        { text: "나에게는 사는 것이 그리스도이고 죽는 것도 유익입니다.", ref: "빌립보서 1:21" },
        { text: "그러므로 믿음과 소망과 사랑 이 세 가지는 항상 있을 것인데 그 중에 제일은 사랑입니다.", ref: "고린도전서 13:13" },
        { text: "내가 너희를 사랑한 것처럼 너희도 서로 사랑하여라 이것이 나의 계명이다.", ref: "요한복음 15:12" },
        { text: "예수께서 마르다에게 말씀하셨다 나는 부활이요 생명이니 나를 믿는 사람은 죽어도 살 것이다.", ref: "요한복음 11:25" },
        { text: "진리가 너희를 자유롭게 할 것이다.", ref: "요한복음 8:32" },
        { text: "구하여라 그러면 주실 것이다 찾아라 그러면 찾을 것이다 문을 두드려라 그러면 열릴 것이다.", ref: "마태복음 7:7" },
        { text: "보아라 내가 문 밖에 서서 두드리고 있다 누구든지 내 음성을 듣고 문을 열면 나는 그에게 들어가 그와 함께 먹고 그도 나와 함께 먹을 것이다.", ref: "요한계시록 3:20" },
        { text: "여러분 가운데 지혜가 부족한 사람이 있으면 하나님께 구하십시오 그분은 모든 사람에게 아낌없이 주시고 꾸짖지 않으시는 분이십니다.", ref: "야고보서 1:5" },
        { text: "하나님께 가까이 가십시오 그러면 그분도 여러분에게 가까이 오실 것입니다.", ref: "야고보서 4:8" },
        { text: "의인의 간절한 기도는 큰 효력을 냅니다.", ref: "야고보서 5:16" },
        { text: "악에게 지지 말고 선으로 악을 이기십시오.", ref: "로마서 12:21" },
        { text: "나는 그리스도와 함께 십자가에 못 박혔습니다 이제 살고 있는 것은 내가 아닙니다 그리스도께서 내 안에서 살고 계십니다.", ref: "갈라디아서 2:20" },
        { text: "나를 불러라 그러면 내가 응답하겠다 네가 알지 못하는 크고 은밀한 일을 네게 보여 주겠다.", ref: "예레미야 33:3" },
        { text: "모든 성경은 하나님의 감동으로 된 것으로 교훈과 책망과 바르게 함과 의로운 교육에 유익합니다.", ref: "디모데후서 3:16" },
        { text: "성령이 여러분에게 내려오시면 여러분은 능력을 받아서 예루살렘과 온 유대와 사마리아와 땅 끝까지 이르러 내 증인이 될 것입니다.", ref: "사도행전 1:8" },
        { text: "주님의 인자하심은 끝이 없고 그분의 긍휼하심은 다함이 없으니 아침마다 새롭습니다.", ref: "예레미야애가 3:22-23" },
        { text: "숨이 있는 것들은 모두 주님을 찬양하여라 할렐루야.", ref: "시편 150:6" },

        { text: "주님은 너를 지키시는 분이시다 주님이 네 오른쪽에서 그늘이 되어 주신다.", ref: "시편 121:5" },

        { text: "오직 의인은 믿음으로 살 것이다.", ref: "로마서 1:17" },
        { text: "너희는 세상의 빛이다 산 위에 세운 마을은 숨길 수 없다.", ref: "마태복음 5:14" },
        { text: "너희는 세상의 소금이다 소금이 짠맛을 잃으면 무엇으로 그 맛을 되찾겠느냐.", ref: "마태복음 5:13" },
        { text: "복 있는 사람은 악인들의 계획을 따르지 않고 죄인들의 길에 서지 않으며 오만한 자들의 자리에 앉지 않는다.", ref: "시편 1:1" },
        { text: "오직 주님의 율법을 즐거워하며 그 율법을 밤낮으로 묵상하는 사람이다.", ref: "시편 1:2" },
        { text: "나는 주님을 항상 내 앞에 모신다 그분이 내 오른쪽에 계시니 나는 흔들리지 않는다.", ref: "시편 16:8" },
        { text: "하늘은 하나님의 영광을 선포하고 창공은 그분의 솜씨를 알려 줍니다.", ref: "시편 19:1" },
        { text: "주님은 나의 반석이시요 나의 요새시요 나를 건져 주시는 분이시다 나의 하나님이시요 내가 피하는 나의 바위시요 나의 방패시요 나를 구원하시는 뿔이시요 나의 산성이시다.", ref: "시편 18:2" },

        { text: "무엇이든지 참되고 무엇이든지 경건하고 무엇이든지 옳고 무엇이든지 순결하고 무엇이든지 사랑스럽고 무엇이든지 칭찬 받을 만하면 이런 것들을 생각하십시오.", ref: "빌립보서 4:8" },
        { text: "하나님은 신실하십니다 여러분이 감당하지 못할 시험을 허락하지 않으시고 시험을 받을 때에는 피할 길도 주셔서 여러분이 능히 견딜 수 있게 하십니다.", ref: "고린도전서 10:13" },
        { text: "나는 어릴 때부터 늙기까지 의인이 버림받거나 그 자손이 밥을 구걸하는 것을 본 일이 없습니다.", ref: "시편 37:25" },
        { text: "주님을 경외하는 것이 지혜의 근본이다 그 계명을 따르는 사람은 모두 훌륭한 지각을 가진다 주님을 찬양하는 노래는 영원히 이어질 것이다.", ref: "시편 111:10" },

        { text: "주님께서 너를 지키실 것이다 네가 들어오고 나갈 때에 이제부터 영원까지 지키실 것이다.", ref: "시편 121:8" },

        { text: "어린아이들이 내게 오는 것을 허락하고 막지 마라 하나님의 나라는 이런 어린아이들의 것이다.", ref: "마가복음 10:14" },
        { text: "주님의 눈은 의인을 향하고 주님의 귀는 그들의 부르짖음에 기울어져 있습니다.", ref: "시편 34:15" },
      ]

    // --- Per-user verse of the day logic ---
    // Each user gets a stable random ID stored in localStorage.
    // Combined with today's date, this gives each user their own
    // consistent verse for the entire day, different from other users.
    function getUserId() {
      let uid = localStorage.getItem('bracelet_uid');
      if (!uid) {
        uid = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
        localStorage.setItem('bracelet_uid', uid);
      }
      return uid;
    }

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    const today = new Date();
    const dateStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
    const userId = getUserId();
    const userDaySeed = hashCode(userId + dateStr);

    const days = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
    const m = today.getMonth() + 1;
    const d = today.getDate();
    const y = today.getFullYear();
    document.getElementById('date-label').textContent = `${y}년 ${m}월 ${d}일 ${days[today.getDay()]}`;

    function showVerse(translation) {
      const list = verses[translation];
      const idx = userDaySeed % list.length;
      document.getElementById('verse-text').textContent = list[idx].text;
      document.getElementById('verse-ref').textContent = list[idx].ref;
      document.getElementById('translation-label').textContent = translation === 'gae' ? '개역개정' : '새번역';
    }

    window.setTranslation = function(t) {
      document.getElementById('btn-gae').classList.toggle('active', t === 'gae');
      document.getElementById('btn-sae').classList.toggle('active', t === 'sae');
      showVerse(t);
    }

    showVerse('gae');
  </script>
